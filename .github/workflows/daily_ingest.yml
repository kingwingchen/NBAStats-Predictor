name: Daily Ingest + Inference

# Runs at 9 AM ET (13:00 UTC) every day.
# Manual dispatch lets you backfill a specific date or re-run after an outage.
on:
  schedule:
    - cron: '0 13 * * *'   # 9 AM ET — primary run after overnight results land
    - cron: '0 16 * * *'   # 12 PM ET — safety net: re-runs if the 9 AM run failed or missed games
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Override date (YYYY-MM-DD). Defaults to today when blank.'
        required: false
        default: ''

jobs:
  run-daily:
    name: Ingest → Backfill actuals → Predict tonight
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # opt in ahead of June 2 forced cutover

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv + Python
        uses: astral-sh/setup-uv@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run daily pipeline
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          if [ -n "${{ github.event.inputs.target_date }}" ]; then
            uv run python -m nba_predictor.pipelines.run_daily "${{ github.event.inputs.target_date }}"
          else
            uv run python -m nba_predictor.pipelines.run_daily
          fi
